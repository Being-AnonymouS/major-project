services:
  - type: web
    name: mentor-connect-backend-piyushcoder07-20260406
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm run start:production
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mentor-connect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: 12
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: admin@mentorconnect.com
      - key: BOOTSTRAP_ADMIN_NAME
        value: Administrator
      - key: BOOTSTRAP_ADMIN_PASSWORD
        value: admin123
      - key: BOOTSTRAP_INCLUDE_DEMO_USERS
        value: true
      - key: BOOTSTRAP_MENTOR_EMAIL
        value: mentor@mentorconnect.com
      - key: BOOTSTRAP_MENTOR_NAME
        value: Mentor Demo
      - key: BOOTSTRAP_MENTOR_PASSWORD
        value: mentor123
      - key: BOOTSTRAP_MENTEE_EMAIL
        value: mentee@mentorconnect.com
      - key: BOOTSTRAP_MENTEE_NAME
        value: Mentee Demo
      - key: BOOTSTRAP_MENTEE_PASSWORD
        value: mentee123
    healthCheckPath: /api/health

databases:
  - name: mentor-connect-db
    databaseName: mentor_connect
    plan: free
    region: singapore
