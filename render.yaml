services:
  - type: web
    name: mentor-connect-backend-piyushcoder07-20260406
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm run start:production
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mentor-connect-db-piyushcoder07-20260406
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: 12
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: admin@mentorconnect.com
      - key: BOOTSTRAP_ADMIN_NAME
        value: Administrator
      - key: BOOTSTRAP_ADMIN_PASSWORD
        value: admin123
    healthCheckPath: /api/health

databases:
  - name: mentor-connect-db-piyushcoder07-20260406
    databaseName: mentor_connect
    plan: free
    region: singapore
